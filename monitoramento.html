<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroVision - Monitoramento Orbital</title>
    <link rel="stylesheet" href="src/index.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <img src="src/assets/logo.gs.jpeg" alt="AgroVision" class="logo-img">
                <span>AgroVision</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="sobre.html" class="nav-link">Sobre</a>
                <a href="monitoramento.html" class="nav-link active">Monitoramento</a>
                <a href="alertas.html" class="nav-link">Alertas</a>
                <a href="faq.html" class="nav-link">FAQ</a>
                <a href="contato.html" class="nav-link">Contato</a>
                <a href="integrantes.html" class="nav-link">Equipe</a>
            </nav>
        </div>
    </header>

    <main style="padding: 40px 5%; max-width: 1200px; margin: 0 auto;">
        <h1 style="color: #2E7D32; margin-bottom: 10px;">Painel de Monitoramento</h1>
        <p style="color: #666; margin-bottom: 30px;">Análise de índices de vegetação (NDVI) capturados em tempo real.</p>

        <section style="background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 40px;">
            <h3 style="color: #333; margin-bottom: 20px;">Histórico de Saúde Vegetal (Últimos 4 Meses)</h3>
            <div style="display: flex; align-items: flex-end; justify-content: space-around; height: 200px; padding-top: 20px; border-bottom: 2px solid #ccc;">
                <div style="display: flex; flex-direction: column; align-items: center; width: 60px;">
                    <div style="background: #81C784; width: 100%; height: 120px; border-radius: 4px 4px 0 0;"></div>
                    <span style="font-size: 0.9rem; color: #666; margin-top: 8px;">Fev</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; width: 60px;">
                    <div style="background: #4CAF50; width: 100%; height: 150px; border-radius: 4px 4px 0 0;"></div>
                    <span style="font-size: 0.9rem; color: #666; margin-top: 8px;">Mar</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; width: 60px;">
                    <div style="background: #388E3C; width: 100%; height: 180px; border-radius: 4px 4px 0 0;"></div>
                    <span style="font-size: 0.9rem; color: #666; margin-top: 8px;">Abr</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; width: 60px;">
                    <div style="background: #1B5E20; width: 100%; height: 165px; border-radius: 4px 4px 0 0;"></div>
                    <span style="font-size: 0.9rem; color: #666; margin-top: 8px;">Mai</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
